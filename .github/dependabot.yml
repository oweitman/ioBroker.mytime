version: 2
updates:
    - package-ecosystem: npm
      directories: ['**/*']
      schedule:
          interval: weekly
          time: '10:00'
          timezone: Europe/Berlin
      open-pull-requests-limit: 15
      assignees:
          - oweitman
      versioning-strategy: increase
      cooldown:
          default-days: 7
      ignore:
          # Keep @types/node aligned with the supported Node.js runtime; do not bump majors automatically.
          - dependency-name: '@types/node'
            update-types: ['version-update:semver-major']

    - package-ecosystem: github-actions
      directories: ['/']
      schedule:
          interval: weekly
          time: '10:00'
          timezone: Europe/Berlin
      open-pull-requests-limit: 15
      assignees:
          - oweitman
